
<!DOCTYPE html>
<html>
  <head>
    <title>BonziWIKI | BonziWORLD Renewed+</title>
    <meta content="" />
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="mobile-web-app-capable" content="yes" />
    <link rel="stylesheet" type="text/css" href="/dist/css/bootstrap.css" />
    <link rel="apple-touch-icon" sizes="180x180" href="/favicons/apple-touch-icon.png" />
    <link rel="icon" type="image/png" href="/favicons/favicon-32x32.png" sizes="32x32" />
    <link rel="icon" type="image/png" href="/favicons/favicon-16x16.png" sizes="16x16" />
    <link rel="manifest" href="/favicons/manifest.json" />
    <link rel="mask-icon" href="/favicons/safari-pinned-tab.svg" color="#5bbad5" />
    <link rel="shortcut icon" href="/favicons/favicon.ico" />
    <meta name="msapplication-config" content="/favicons/browserconfig.xml" />
    <meta name="theme-color" content="#6D33A0" />
    <link rel="stylesheet" type="text/css" href="/dist/css/readme.css" />
    <script src="/js/lib/jquery.min.js"></script>
    <script src="/js/version_handler_sub.js"></script>
    <script src="/dist/js/angular.min.js"></script>
    <meta name="keywords" content="BonziWORLD, BonziWORLD Classic, BonziWORLD Renewed+, BonziWORLD Renewed+, bonziworld, bonziworld classic, bonziworld renewed, BonziWORLD Renewed, bonzibuddy, BonziBUDDY, BonziWORLD FE, bonziworld fe">
    <meta name="og:keywords" content="BonziWORLD, BonziWORLD Renewed+, BonziWORLD Renewed+, BonziWORLD Classic, bonziworld, bonziworld classic, bonziworld renewed, BonziWORLD Renewed, bonzibuddy, BonziBUDDY, BonziWORLD FE, bonziworld fe">
    <style>
      @charset 'UTF-8';
      [ng\:cloak],
      [ng-cloak],
      [data-ng-cloak],
      [x-ng-cloak],
      .ng-cloak,
      .x-ng-cloak,
      .ng-hide:not(.ng-hide-animate) {
        display: none !important;
      }
      ng\:form {
        display: block;
      }
      .ng-animate-shim {
        visibility: hidden;
      }
      .ng-anchor {
        position: absolute;
      }
    </style>
  </head>
  <body class="no_selection">
    <script>
      window.environment = "production";
    </script>
    <div class="container mt-4" id="content">
      <div class="row">
        <div class="col-sm-12 text-center"><img src="/img/readme/logo.png"/></div>
        <div class="col-sm-12 text-center">
          <h1 id="bonziwiki">BonziWIKI</h1>
          <br />
          <h3 class="text-muted">The BonziWORLD Community Wiki</h3>
        </div>
      </div>
      <div class="row">
        <div class="col-sm-12"><hr /></div>
        <div class="col-sm-12">
          <b><h2>Search Articles</h2></b>
          <div class="input-group buscador-principal">
            <input name="search_param" value="all" id="search_param" type="hidden">
            <input class="form-control" name="x" placeholder="Search" type="text">
            <div class="input-group-btn search-panel">
              <button type="button" id="search" class="btn btn-default dropdown-toggle" data-toggle="dropdown">
                <span id="search_concept">Category</span> <span class="caret"></span>
              </button>
              <ul class="dropdown-menu" role="menu">
                <li><a href="/wiki/search/Sports">Sports</a></li>
                <li><a href="/wiki/search/Games">Games</a></li>
                <li><a href="/wiki/search/Coding">Coding</a></li>
                <li><a href="/wiki/search/Restaurants">Restaurants</a></li>
                <li class="divider"></li>
                <li><a href="#">Go on pick one</a></li>
              </ul>
            </div>
            <span class="input-group-btn">
              <button id="searching" class="btn btn-primary" type="button"><span class="glyphicon glyphicon-search"></span></button>
            </span>
          </div>
        </div>
      </div>
      <div class="row">
        <div class="col-sm-12 text-center">
          <a href="/wiki/new" class="btn btn-success">New Article</a>
          <a href="/wiki/show" class="btn btn-info">View Articles</a>
          <a href="/wiki/login.html" class="btn btn-warning">Login</a>
          <a href="/wiki/signup.html" class="btn btn-secondary">Signup</a>
        </div>
      </div>
    </div>
    </footer>
    <script>
      // search placeholder
      $('#searching').click(function(){alert('Search not available');});

      // Hide Login/Signup buttons if authenticated
      $.get('/api/me').done(function(resp){
        if(resp && resp.user){
          $('a[href="/wiki/login.html"]').hide();
          $('a[href="/wiki/signup.html"]').hide();
        }
      });
    </script>
    <script src="/socket.io/socket.io.js"></script>
    <script src="/js/wiki.js"></script>
  </body>
</html>
