<!DOCTYPE html>
<html>
<head>
    <title>BonziWIKI - Signup</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="/dist/css/bootstrap.css">
    <link rel="stylesheet" href="/css/readme.min.css">
    <script src="/js/lib/jquery.min.js"></script>
</head>
<body>
<nav class="navbar navbar-inverse">
  <div class="container-fluid">
    <div class="navbar-header">
      <a id="navbar-brand" href="/wiki"><img src="/img/desktop/logo.png" alt="BonziWORLD Logo" style="height:40px;"></a>
    </div>
    <ul class="nav navbar-nav">
      <li><a href="/wiki">Home</a></li>
      <li><a href="/wiki/show">Articles</a></li>
    </ul>
  </div>
</nav>
<div class="container mt-4" id="content">
  <h1>Signup</h1>
  <form id="signup-form">
    <label>Username:</label><br>
    <input type="text" name="user"><br>
    <label>Password:</label><br>
    <input type="password" name="pass"><br><br>
    <button type="submit" class="btn btn-primary">Signup</button>
  </form>
</div>
<script>
function getNextParam() {
  const qs = new URLSearchParams(window.location.search);
  return qs.get('next') || null;
}

$('#signup-form').submit(function(e){
  e.preventDefault();
  const payload = { user: $('input[name=user]').val(), pass: $('input[name=pass]').val() };
  const next = getNextParam();
  if (next) payload.next = next;
  $.ajax({url:'/signup',method:'POST',contentType:'application/json',data:JSON.stringify(payload)})
    .done(function(resp){
      const dest = (resp && resp.next) ? resp.next : '/wiki/show';
      window.location.href = dest;
    })
    .fail(function(xhr){ alert('Signup failed: '+(xhr.responseJSON?.error||xhr.statusText)); });
});
</script>
</body>
</html>
