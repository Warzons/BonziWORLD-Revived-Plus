<script>
// search handler: perform AJAX search (no full reload)
$('#searching').off('click').on('click', function(){
  const q = $('input[name="x"]').val();
  if (q) ajaxSearch(q);
});

// load articles list dynamically
function renderArticles(list){
    const container = $('#articles');
    container.empty();
    if (!list.length) { container.append('<p>No articles yet.</p>'); return; }
    list.forEach(a => {
        let historyBtn = '';
            if (a.versions && a.versions.length) {
                historyBtn = `<button class="btn btn-xs btn-default history-btn" data-id="${a.id}">History (${a.versions.length})</button>`;
            }
            container.append(`
            <hr>
            <h2>Title: ${a.title}</h2>
            <h4>Category: ${a.category}</h4>
            <p><em>by ${a.author||'anonymous'}</em></p>
            <p>${a.content}</p>
            <p class="date">${a.date.split('T')[0]}</p>
            ${historyBtn}
            <a href="/wiki/${a.id}/edit" class="btn btn-primary btn-warning">Edit</a>
            <hr>
        `);
    });
}

// determine query parameters
function getQuery() {
    const qs = new URLSearchParams(window.location.search);
    const obj = {};
    for (const [k,v] of qs.entries()) obj[k] = v;
    return obj;
}

const params = getQuery();
let url = '/api/wiki';
if (Object.keys(params).length) {
    url += '?' + new URLSearchParams(params).toString();
}

$.get(url).done(renderArticles);

// author filter click handler
$('#author-filter').click(function(e){
  e.preventDefault();
  const name = prompt('Enter author name:');
  if (name) {
    // load filtered results via AJAX
    $.get('/api/wiki', { author: name }).done(renderArticles);
  }
});

// history button handler
$(document).on('click', '.history-btn', function(){
    const id = $(this).data('id');
    $.get('/api/wiki').done(function(list){
        const art = list.find(a=>a.id==id);
        if (!art) return;
        let msg = 'Previous versions:\n';
        art.versions.forEach(v=>{ msg += v.date.split('T')[0] + ' by ' + (v.author||'unknown') + '\n'; });
        alert(msg);
    });
});

</script>
