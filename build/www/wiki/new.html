<div class="container mt-4" id="content">
  <h1>Submit an article</h1>
  <section>
    <form id="new-article-form">
      <label for="wiki[title]">Title:</label><br>
      <input type="text" name="wiki[title]"><br>
      <label for="wiki[category]">Category:</label><br>
      <input type="text" name="wiki[category]"><br>
      <label for="wiki[content]">Content:</label>
      <textarea class="form-control" name="wiki[content]" rows="20" id="markdown"></textarea>
      <button type="submit" class="btn btn-primary">Submit</button>
    </form>
  </section>

<script>
// search placeholder
$('#searching').click(function(){alert('Search not available');});

// handle new wiki article submission
$('#new-article-form').submit(function(e){
    e.preventDefault();
    const payload = {
        title: $('input[name="wiki[title]"]').val(),
        category: $('input[name="wiki[category]"]').val(),
        content: $('textarea[name="wiki[content]"]').val()
    };
    $.ajax({url: '/api/wiki', method: 'POST', data: payload})
        .done(function(){ alert('Article submitted'); window.location.href = '/wiki/show'; })
        .fail(function(err){ alert('Failed: '+err.responseJSON?.error); });
});
</script>
<script src="/socket.io/socket.io.js"></script>
